# ============================================================
# Full Rebuild — manually triggered when IT cleans up sandbox
# Deploys everything + runs orchestrator to recreate all data
# ============================================================
name: "Full Rebuild (After Cleanup)"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev

concurrency:
  group: rebuild-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  rebuild:
    name: "Full rebuild on ${{ github.event.inputs.target }}"
    runs-on: ubuntu-latest
    # Require approval for staging/prod
    environment: ${{ github.event.inputs.target == 'prod' && 'production' || github.event.inputs.target == 'staging' && 'staging' || 'development' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target }}

      - name: Deploy bundle
        run: databricks bundle deploy
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target }}

      - name: Run full orchestrator
        run: databricks bundle run data_mesh_orchestrator --refresh-all
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target }}

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Full Rebuild Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ github.event.inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What was recreated" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ Catalogs: adoit_product, snow_product, data_mesh_hub" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ Schemas: bronze/silver/gold per domain + platform" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ Tables + sample data (bronze → silver → gold)" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ Cross-domain product (Application Risk Profile)" >> $GITHUB_STEP_SUMMARY
          echo "5. ✅ Governance (registry, contracts, observability)" >> $GITHUB_STEP_SUMMARY
          echo "6. ✅ Advanced governance (CDF, row-level security)" >> $GITHUB_STEP_SUMMARY
          echo "7. ✅ Delta Sharing shares for Private Exchange" >> $GITHUB_STEP_SUMMARY
          echo "8. ✅ Dashboard deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manual steps still needed" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Provider signup (if first time)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Create Private Listings in Provider Console" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Create/update Private Exchange" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Deploy Genie agent (notebook 05)" >> $GITHUB_STEP_SUMMARY