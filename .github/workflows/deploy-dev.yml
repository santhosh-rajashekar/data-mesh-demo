# ============================================================
# Dev Deployment — runs on push to main
# Deploys bundle + runs orchestrator to recreate full demo
# ============================================================
name: "Deploy to Dev"

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deployment at a time
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy bundle to dev"
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: dev

      - name: Deploy bundle
        run: databricks bundle deploy
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: dev

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Dev Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** dev" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Resources" >> $GITHUB_STEP_SUMMARY
          echo "- 10 notebooks (00–09)" >> $GITHUB_STEP_SUMMARY
          echo "- 3 catalogs + 8 schemas" >> $GITHUB_STEP_SUMMARY
          echo "- 1 dashboard (3 pages)" >> $GITHUB_STEP_SUMMARY
          echo "- 1 orchestration job" >> $GITHUB_STEP_SUMMARY
          echo "- 1 SQL alert" >> $GITHUB_STEP_SUMMARY

  run-orchestrator:
    name: "Run full Data Mesh setup"
    runs-on: ubuntu-latest
    needs: deploy
    # Only run orchestrator if explicitly requested via workflow_dispatch
    # or on the first push (when environment needs full setup)
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[full-setup]')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Run orchestrator job
        run: databricks bundle run data_mesh_orchestrator
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: dev

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Orchestrator Complete" >> $GITHUB_STEP_SUMMARY
          echo "All notebooks executed in order. Data Mesh demo fully recreated." >> $GITHUB_STEP_SUMMARY