# ============================================================
# Production Deployment — runs on release tag
# Deploys bundle to prod target with approval gate
# ============================================================
name: "Deploy to Production"

on:
  release:
    types: [published]

  # Allow manual trigger for emergency deployments
  workflow_dispatch:
    inputs:
      run_orchestrator:
        description: "Run orchestrator after deploy?"
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  validate:
    name: "Validate bundle (prod)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_PROD }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_PROD }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: prod

  deploy:
    name: "Deploy bundle to prod"
    runs-on: ubuntu-latest
    needs: validate
    # Requires the 'production' environment (configure approval in GitHub Settings)
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle
        run: databricks bundle deploy
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_PROD }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_PROD }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: prod

      - name: Summary
        if: success()
        run: |
          echo "## 🚀 Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** prod" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ github.event.release.tag_name || 'manual' }}" >> $GITHUB_STEP_SUMMARY

  run-orchestrator:
    name: "Run orchestrator (prod)"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event.inputs.run_orchestrator == 'true'
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Run orchestrator job
        run: databricks bundle run data_mesh_orchestrator --refresh-all
        working-directory: .
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_PROD }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_PROD }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_BUNDLE_ENV: prod