# Hub schemas only — domain schemas managed by domain workspaces
resources:
  schemas:
    hub_cross_domain:
      name: cross_domain
      catalog_name: ${var.hub_catalog}
      comment: "Cross-domain data products | Federated from multiple domains"

    hub_platform:
      name: platform
      catalog_name: ${var.hub_catalog}
      comment: "Platform governance tables | Registry, contracts, observability"
