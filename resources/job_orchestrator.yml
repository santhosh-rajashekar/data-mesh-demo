# Hub orchestration job — runs AFTER domain pipelines complete
# Domain pipelines (ADOIT, SNOW) run independently in their own workspaces
resources:
  jobs:
    data_mesh_orchestrator:
      name: "Data Mesh Hub — Cross-Domain & Governance"
      description: "Runs hub notebooks: platform setup, cross-domain product, quality, governance, exchange"

      tasks:
        # ── Phase 1: Hub Infrastructure ──
        - task_key: setup_infrastructure
          description: "Create hub catalog, platform tables, grants"
          notebook_task:
            notebook_path: ../src/notebooks/00_Data_Mesh_Overview_and_Setup.ipynb

        # ── Phase 2: Cross-Domain Product ──
        - task_key: cross_domain_product
          depends_on:
            - task_key: setup_infrastructure
          description: "Cross-catalog JOIN: Application Risk Profile (reads from domain gold tables)"
          notebook_task:
            notebook_path: ../src/notebooks/03_Cross_Domain_Data_Product.ipynb

        # ── Phase 3: Quality & Governance ──
        - task_key: data_quality
          depends_on:
            - task_key: cross_domain_product
          description: "Quality checks across all 3 catalogs (reads domain products)"
          notebook_task:
            notebook_path: ../src/notebooks/04_Data_Quality_Monitoring.ipynb

        - task_key: governance
          depends_on:
            - task_key: data_quality
          description: "Registry, contracts, observability, maturity scorecard"
          notebook_task:
            notebook_path: ../src/notebooks/07_Data_Product_Governance.ipynb

        - task_key: advanced_governance
          depends_on:
            - task_key: governance
          description: "CDF, row-level security, alerting"
          notebook_task:
            notebook_path: ../src/notebooks/08_Advanced_Governance.ipynb

        # ── Phase 4: Distribution ──
        - task_key: private_exchange
          depends_on:
            - task_key: advanced_governance
          description: "Create Delta Sharing shares and update registry"
          notebook_task:
            notebook_path: ../src/notebooks/09_Private_Exchange_Setup.ipynb
